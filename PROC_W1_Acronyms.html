<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BlackRock Acronyms</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080d;--panel:#0d1420;--surface:#111928;--border:#182438;--hi:#1e3050;
  --text:#cdd8f0;--muted:#4a6080;--dim:#090d14;
  --ok:#10b981;--bad:#ef4444;--gold:#f5a623;
  --ok-d:rgba(16,185,129,0.12);--bad-d:rgba(239,68,68,0.1);--gold-d:rgba(245,166,35,0.1);
  --c-know:#f472b6;--c-own:#fb923c;--c-comm:#a78bfa;--c-risk:#38bdf8;--c-seek:#4ade80;
}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(43,127,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(43,127,255,0.03) 1px,transparent 1px);
  background-size:60px 60px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:36px 18px 60px}
.hdr{margin-bottom:28px}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.title{font-family:'Playfair Display',serif;font-size:clamp(24px,4vw,36px);line-height:1.15;color:var(--text);margin-bottom:10px}
.sub{font-size:13px;color:var(--muted);line-height:1.7;max-width:540px;margin-bottom:20px}
.comp-strip{display:flex;gap:8px;flex-wrap:wrap;padding:10px 14px;background:var(--panel);border:1px solid var(--border);border-radius:10px;margin-bottom:20px}
.comp-strip-lbl{width:100%;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.cpill{display:flex;align-items:center;gap:5px;font-size:10px;font-family:'IBM Plex Mono',monospace;padding:3px 9px;border-radius:20px;border:1px solid currentColor}
.cdot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.prog-wrap{margin-bottom:24px}
.prog-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:7px}
.prog-fill{height:100%;border-radius:2px;transition:width .5s ease}
.prog-meta{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
.streak{color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:10px}
/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .3s;animation:slideUp .32s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.card-top{padding:10px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.tag{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase}
.card-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
.card-comp-bar{padding:8px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.card-comp-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.card-comp-pills{display:flex;gap:6px;flex-wrap:wrap}
.card-cpill{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:2px 8px;border-radius:10px;border:1px solid;letter-spacing:.06em;font-weight:600}
.card-body{padding:28px 22px 22px}
.card-q{font-family:'Playfair Display',serif;font-size:clamp(15px,2.5vw,20px);line-height:1.6;font-style:italic}
/* Choices */
.choices{padding:0 22px 18px;display:flex;flex-direction:column;gap:9px}
.choice{display:flex;gap:10px;padding:13px 14px;border-radius:10px;font-size:13px;text-align:left;cursor:pointer;transition:all .2s;border:1px solid var(--border);color:var(--muted);background:transparent;line-height:1.5}
.choice:not(:disabled):hover{border-color:var(--hi);color:var(--text)}
.choice .letter{font-family:'IBM Plex Mono',monospace;font-size:11px;flex-shrink:0}
.choice.correct{background:var(--ok-d);border-color:var(--ok);color:var(--ok)}
.choice.wrong{background:var(--bad-d);border-color:var(--bad);color:var(--bad)}
/* Sort buttons */
.sort-btns{padding:0 22px 18px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.sort-btn{padding:14px 8px;border-radius:10px;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:all .22s;border:1px solid var(--border);color:var(--muted);background:transparent}
.sort-btn:not(:disabled):hover{transform:translateY(-2px)}
/* Explanation */
.expl{margin:0 22px 16px;padding:14px 16px;border-radius:10px;border-left:3px solid;animation:slideUp .28s ease}
.expl-hdr{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px}
.expl-txt{font-size:13.5px;line-height:1.7;color:var(--text);margin-bottom:10px}
.comp-insight{padding:10px 12px;border-radius:8px;border:1px solid;margin-top:8px}
.comp-insight-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px;font-weight:600}
.comp-insight-txt{font-size:12px;line-height:1.6;font-style:italic}
/* Next / Restart */
.btn-next{display:block;width:calc(100% - 44px);margin:0 22px 22px;padding:13px;background:transparent;border:1px solid var(--hi);border-radius:10px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;cursor:pointer;transition:background .2s}
.btn-next:hover{background:var(--border)}
/* Flash */
.flash-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 22px;min-height:170px;cursor:pointer;transition:border-color .3s;animation:slideUp .32s ease}
.flash-hint{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px}
.flash-q{font-family:'Playfair Display',serif;font-size:clamp(17px,2.5vw,21px);line-height:1.55;font-style:italic}
.flash-tap{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:16px}
.flash-back-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px}
.flash-ans{font-size:14.5px;line-height:1.75;color:var(--text);margin-bottom:14px}
.flash-why{padding:12px 14px;border-radius:8px;margin-top:4px}
.flash-why-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px;font-weight:600}
.flash-why-txt{font-size:12px;line-height:1.6;font-style:italic;color:var(--text)}
.mark-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.mark-btn{padding:12px;border-radius:9px;font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;transition:all .2s;border:1px solid;background:transparent}
/* Pulse */
.client-hdr{padding:16px 22px;border-bottom:1px solid var(--border)}
.client-name{font-size:19px;font-weight:500;margin-bottom:3px}
.client-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
.client-ctx{padding:10px 22px;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);font-style:italic;line-height:1.5;border-left:2px solid var(--hi)}
.signals-list{padding:0 22px}
.signal-row{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.signal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.signal-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.signal-val{font-size:13px;color:var(--text)}
.diagnose-btns{padding:14px 22px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.d-btn{padding:12px 6px;border-radius:10px;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;transition:all .22s;border:1px solid var(--border);color:var(--muted);background:transparent}
.d-btn:not(:disabled):hover{transform:translateY(-2px)}
/* Results */
.results{text-align:center;padding:44px 16px;animation:slideUp .4s ease}
.results-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.results-score{font-family:'Playfair Display',serif;font-size:80px;font-weight:700;line-height:1}
.results-grade{font-size:18px;margin-top:6px;margin-bottom:4px}
.results-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.comp-profile{margin-bottom:20px;padding:14px 16px;background:var(--panel);border:1px solid var(--border);border-radius:10px;text-align:left}
.comp-profile-title{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.comp-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.comp-row-lbl{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);width:175px;flex-shrink:0}
.comp-row-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.comp-row-fill{height:100%;border-radius:2px;transition:width .8s ease}
.comp-row-n{font-family:'IBM Plex Mono',monospace;font-size:10px;width:30px;text-align:right;flex-shrink:0}
.review-list{text-align:left;margin-bottom:20px;background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.review-item{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);font-size:12.5px}
.review-item:last-child{border-bottom:none}
.review-q{color:var(--text);line-height:1.4;margin-bottom:3px}
.review-ans{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
.btn-restart{width:100%;padding:14px;background:var(--surface);border:1px solid var(--hi);border-radius:10px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.1em;cursor:pointer;transition:background .2s}
.btn-restart:hover{background:var(--panel)}
.legend{display:flex;gap:22px;margin-top:18px;flex-wrap:wrap;justify-content:center}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.leg-dot{width:8px;height:8px;border-radius:50%}
@media(max-width:480px){.sort-btns,.diagnose-btns{grid-template-columns:1fr 1fr 1fr;gap:6px}.sort-btn,.d-btn{font-size:12px;padding:11px 4px}}

:root{--accent:#38bdf8}
.prog-fill{background:linear-gradient(90deg,#38bdf8,var(--gold))}
.tag{color:#38bdf8}
.flash-card.open{border-color:#38bdf8}
.flash-back-lbl{color:#38bdf8}
.flash-why{background:#38bdf818;border:1px solid #38bdf844}
.flash-why-lbl{color:#38bdf8}
</style>
</head>
<body>
<div class="wrap">

<div class="hdr">
  <div class="eyebrow">Week 1 · Process / Implement · CSO EMEA</div>
  <h1 class="title">BlackRock Acronyms</h1>
  <p class="sub">CEM is full of acronyms. This game tests whether you can identify what each one means — and what it means for your role as a CSO.</p>
  <div class="comp-strip"><div class="comp-strip-lbl">Core Competencies</div><span class="cpill" style="color:var(--c-own)"><span class="cdot"></span>Own Outcomes</span><span class="cpill" style="color:var(--c-risk)"><span class="cdot"></span>Recognize & Remediate Risk</span></div>
</div>
<div class="prog-wrap"><div class="prog-track"><div class="prog-fill" id="pb" style="width:0%"></div></div><div class="prog-meta"><span id="pl">Scenario 1 of 6</span><span id="sc">0 / 0 correct</span></div></div>
<div id="area"></div>
<script>
const CARDS=[{"tag":"Systems","stem":"A colleague says: 'Make sure MSD is updated to Notified before you engage Onboarding.' What is MSD and what does this instruction mean?","choices":[{"text":"MSD is a reporting system — 'Notified' means the report has been sent","correct":false,"feedback":"MSD is not a reporting system. It stands for Management System for Deals — BlackRock's pipeline management platform. 'Notified' is a deal status that triggers the CSO's involvement and the onboarding process."},{"text":"MSD is Management System for Deals — 'Notified' status triggers CSO involvement and the onboarding workflow","correct":true,"feedback":"Correct. MSD is the pipeline tool. Setting a deal to 'Notified' is the formal trigger that signals the RM-to-CSO handover is ready to begin. Without this, the Onboarding team cannot act."},{"text":"MSD is a Microsoft system — 'Notified' means an email notification has been sent","correct":false,"feedback":"MSD is BlackRock-specific, not a Microsoft product. Understanding internal systems is foundational to the CSO role."}],"compInsights":{"own":"Own Outcomes starts at the handover. The CSO who waits for the RM to initiate everything is not owning their role — monitoring MSD for the Notified status and acting on it is a CSO responsibility."}},{"tag":"Systems","stem":"Your manager says: 'Raise a Case and DTTS once MSD is populated.' What does this involve?","choices":[{"text":"Send an email to the Onboarding team to let them know a new client is coming","correct":false,"feedback":"An email is not the right mechanism. Raising a Case in the Case Management system is the formal process that engages the Onboarding team, creates the audit trail, and assigns the right stakeholders."},{"text":"Raise a formal case in Case Management and a DTTS (Deal-to-Task-Sheet) to initiate the onboarding implementation process","correct":true,"feedback":"Correct. The Case and DTTS are the formal triggers that engage the implementation team with all relevant deal information. This is the CSO's first formal act after handover."},{"text":"Log the deal in ADAM and notify the PM team","correct":false,"feedback":"ADAM comes after Case Management — you need to know what you're setting up before creating account records. Sequencing matters: Case → ADAM, not the other way around."}],"compInsights":{"risk":"Sequence errors here create downstream gaps. If ADAM is set up before Case Management, there's no process record or stakeholder accountability. The CSO who knows the right sequence prevents operational risk."}},{"tag":"Systems","stem":"A client asks for access to their reports via 'the portal'. An internal colleague mentions 'ACR'. Are these the same thing?","choices":[{"text":"Yes — ACR is the client-facing reporting portal","correct":false,"feedback":"Partially right but not precise. ACR (Automated Client Reporting) is BlackRock's internal system for managing and distributing client reports. Gateway is the client-facing portal where clients view their reports and data."},{"text":"No — ACR is BlackRock's internal reporting management system; Gateway is the client-facing portal","correct":true,"feedback":"Correct. ACR is what CSOs use internally to manage report distribution, find invoices, and update distribution lists. Gateway is what clients log into to access their documents, orders, and data."},{"text":"No — ACR is for invoicing only; Gateway covers all reporting","correct":false,"feedback":"ACR covers both reporting and invoicing. It's the internal system for obtaining client reports, identifying due dates, managing distribution, and accessing invoice data."}],"compInsights":{"know":"Knowing which system the client is asking about vs. which system you use internally is a basic Know Your Client competency. Confusing the two leads to miscommunication in client queries."}},{"tag":"Processes","stem":"Someone refers to a 'PCG breach'. You're new and haven't encountered this. Which of the following best describes what a PCG breach is?","choices":[{"text":"A client complaint about BlackRock's service","correct":false,"feedback":"A complaint is handled under the EMEA Client Complaints policy. PCG stands for Portfolio Compliance Group — it relates to investment guidelines breaches, not service complaints."},{"text":"A situation where the client's portfolio has breached the investment guidelines set in their mandate","correct":true,"feedback":"Correct. PCG monitors client portfolios against their mandate guidelines. A breach occurs when a position or weighting falls outside the agreed parameters. Active breaches require immediate action; passive breaches require monitoring."},{"text":"A data breach affecting client information","correct":false,"feedback":"A data breach is a cyber/information security event, handled under a completely different escalation path. PCG is about portfolio compliance — investment guidelines, not data security."}],"compInsights":{"risk":"Knowing what a PCG breach is — and that it has both active and passive variants with different response requirements — is foundational to Recognize & Remediate Risk."}},{"tag":"Roles","stem":"A new colleague asks: 'What is the difference between RM and CSO?' What is the most accurate description?","choices":[{"text":"RM manages the client relationship commercially; CSO manages it operationally — both are present throughout the client lifecycle","correct":true,"feedback":"Correct. The RM owns the commercial relationship — new business, fee negotiations, strategic conversations. The CSO owns operational delivery — implementation, ongoing service, change events, reporting, invoicing. Both are present; the boundary matters."},{"text":"RM is the senior role; CSO is support","correct":false,"feedback":"CSO is not a support role — it's a distinct professional function with its own accountability. The CSO has primary ownership of significant parts of the client lifecycle that the RM does not."},{"text":"RM works pre-win; CSO works post-win","correct":false,"feedback":"Both RM and CSO have pre-win and post-win responsibilities. The CSO participates in operational due diligence meetings and pitches before a mandate is won."}],"compInsights":{"seek":"Understanding the RM/CSO boundary is the foundation of Seek, Scale & Influence — you can only influence through partnership if you're clear on where your accountability ends and the RM's begins."}},{"tag":"Processes","stem":"What does 'APR' stand for — and when does a CSO raise one?","choices":[{"text":"Annual Performance Review — raised once a year per client","correct":false,"feedback":"APR in the CEM context is not an annual performance review. It is an Account Processing Request — used to initiate support from the DDO team for new client onboarding."},{"text":"Account Processing Request — raised by the CSO to initiate DDO team support during client onboarding","correct":true,"feedback":"Correct. An APR is raised by the CSO during pre-win or early onboarding to bring the Deal Due Operations (DDO) team into the process. It's part of the formal onboarding engagement sequence."},{"text":"Authorised Processing Record — raised when a client approves a change event","correct":false,"feedback":"This is not an accurate definition. APR specifically refers to the Account Processing Request used to engage the DDO team during onboarding."}],"compInsights":{"own":"The CSO who knows when to raise an APR — and does so promptly — owns the onboarding process. Delays in raising the APR delay every downstream workstream."}}];
const COMPS=["own","risk"];
let idx=0,score={c:0,t:0},history=[],streak=0;
let compScore={know:{c:0,t:0},own:{c:0,t:0},comm:{c:0,t:0},risk:{c:0,t:0},seek:{c:0,t:0}};
const cmap={know:"var(--c-know)",own:"var(--c-own)",comm:"var(--c-comm)",risk:"var(--c-risk)",seek:"var(--c-seek)"};
const cnames={know:"Know Your Client",own:"Own Outcomes",comm:"Communicate with Impact",risk:"Recognize & Remediate Risk",seek:"Seek, Scale & Influence"};
function upd(){document.getElementById('pb').style.width=(idx/CARDS.length*100)+'%';document.getElementById('pl').textContent='Scenario '+(idx+1)+' of '+CARDS.length;document.getElementById('sc').textContent=score.c+' / '+score.t+' correct';}
function render(){
  const c=CARDS[idx];upd();
  const cBar=c.comps?c.comps.map(id=>`<span class="card-cpill" style="color:${cmap[id]};border-color:${cmap[id]}">${cnames[id]}</span>`).join(''):'';
  const chs=c.choices.map((ch,i)=>`<button class="choice" id="ch${i}" onclick="pick(${i})"><span class="letter">${String.fromCharCode(65+i)})</span> ${ch.text}</button>`).join('');
  document.getElementById('area').innerHTML=`<div class="card" id="mc">
    <div class="card-top"><span class="tag">${c.tag||'Scenario'}</span><span class="card-lbl">WHAT DO YOU DO?</span></div>
    ${cBar?`<div class="card-comp-bar"><span class="card-comp-lbl">Competencies</span><div class="card-comp-pills">${cBar}</div></div>`:''}
    <div class="card-body"><p class="card-q">"${c.stem}"</p></div>
    <div class="choices">${chs}</div>
  </div>`;
}
function pick(i){
  const c=CARDS[idx];const ok=c.choices[i].correct;
  score.t++;ok?(score.c++,streak++):(streak=0);
  const allC=c.comps||COMPS;
  allC.forEach(id=>{compScore[id].t++;if(ok)compScore[id].c++;});
  history.push({c,i,ok});
  for(let j=0;j<c.choices.length;j++){const b=document.getElementById('ch'+j);b.disabled=true;if(c.choices[j].correct)b.classList.add('correct');else if(j===i&&!ok)b.classList.add('wrong');}
  const ac=ok?'var(--ok)':'var(--bad)';
  document.getElementById('mc').style.borderColor=ac;
  const insightItems=(c.compInsights||{});
  const iHtml=Object.entries(insightItems).map(([id,txt])=>`<div class="comp-insight" style="border-color:${cmap[id]};background:${cmap[id]}18"><div class="comp-insight-lbl" style="color:${cmap[id]}">${cnames[id]}</div><p class="comp-insight-txt">${txt}</p></div>`).join('');
  const expl=document.createElement('div');expl.className='expl';
  expl.style.cssText=`border-left-color:${ac};background:${ok?'rgba(16,185,129,0.1)':'rgba(239,68,68,0.08)'}`;
  expl.innerHTML=`<div class="expl-hdr" style="color:${ok?'var(--ok)':'var(--bad)'}">${ok?'✓ Correct':'✗ Not quite'}</div><p class="expl-txt">${c.choices[i].feedback}</p>${iHtml?`<div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">${iHtml}</div>`:``}`;
  document.getElementById('mc').querySelector('.choices').after(expl);
  const nb=document.createElement('button');nb.className='btn-next';nb.textContent=idx+1>=CARDS.length?'VIEW RESULTS →':'NEXT →';nb.onclick=next;expl.after(nb);
  document.getElementById('sc').textContent=score.c+' / '+score.t+' correct';
}
function next(){idx++;idx>=CARDS.length?done():render();}

function buildCompProfile(compScore){
  const defs={know:{l:"Know Your Client",c:"var(--c-know)"},own:{l:"Own Outcomes",c:"var(--c-own)"},comm:{l:"Communicate with Impact",c:"var(--c-comm)"},risk:{l:"Recognize & Remediate Risk",c:"var(--c-risk)"},seek:{l:"Seek, Scale & Influence",c:"var(--c-seek)"}};
  const rows=Object.entries(compScore).filter(([,v])=>v.t>0).map(([k,v])=>{
    const pct=Math.round(v.c/v.t*100);
    return `<div class="comp-row"><span class="comp-row-lbl">${defs[k].l}</span><div class="comp-row-bar"><div class="comp-row-fill" style="width:${pct}%;background:${defs[k].c}"></div></div><span class="comp-row-n" style="color:${defs[k].c}">${v.c}/${v.t}</span></div>`;
  }).join('');
  return `<div class="comp-profile"><div class="comp-profile-title">Your Competency Profile</div>${rows}</div>`;
}
function done(){
  const p=Math.round(score.c/CARDS.length*100);
  const [g,gc]=p>=90?["Outstanding","var(--ok)"]:p>=75?["Proficient","var(--gold)"]:["Needs Review","var(--bad)"];
  const misses=history.filter(h=>!h.ok);
  const rev=misses.length?`<div class="review-list">${misses.map(h=>`<div class="review-item"><span style="color:var(--bad)">✗</span><div><div class="review-q">${h.c.stem.slice(0,90)}…</div><div class="review-ans">Answer: ${h.c.choices.find(c=>c.correct).text.slice(0,70)}…</div></div></div>`).join('')}</div>`:'';
  document.getElementById('area').innerHTML=`<div class="results">
    <div class="results-eyebrow">Complete</div>
    <div class="results-score" style="color:${gc}">${p}<span style="font-size:36px">%</span></div>
    <div class="results-grade" style="color:${gc}">${g}</div>
    <p class="results-sub">${score.c} of ${CARDS.length} scenarios correct</p>
    ${buildCompProfile(compScore)}
    ${rev}
    <button class="btn-restart" onclick="restart()">RETAKE →</button>
  </div>`;
}
function restart(){idx=0;score={c:0,t:0};history=[];streak=0;compScore={know:{c:0,t:0},own:{c:0,t:0},comm:{c:0,t:0},risk:{c:0,t:0},seek:{c:0,t:0}};render();}
render();
</script>
</div>
